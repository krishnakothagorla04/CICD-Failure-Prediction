on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  predict:
    name: Predict failure risk (pre-execution)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run pre-execution prediction gate
        run: python predict_gate.py --threshold 0.5

  build:
    name: Build
    needs: predict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build (compile the app)
        run: python -m compileall app

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: python -m pytest -v

  deploy:
    name: Deploy (simulated)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy application
        run: |
          echo "Deploying application..."
          echo "Deployment successful (simulated)."
